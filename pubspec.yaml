name: social_media_app
description: A modern, privacy-focused social media platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.4.1
  firebase_auth: ^4.2.5
  cloud_firestore: ^4.3.1
  firebase_storage: ^11.0.10
  firebase_messaging: ^14.2.1
  provider: ^6.0.5
  image_picker: ^0.8.6
  cached_network_image: ^3.2.3
  google_sign_in: ^5.4.3
  shared_preferences: ^2.0.17
  path_provider: ^2.0.12
  uuid: ^3.0.7
  intl: ^0.17.0
  url_launcher: ^6.1.8
  google_fonts: ^4.0.3
  lottie: ^2.2.0
  flutter_staggered_grid_view: ^0.6.2
  video_player: ^2.4.10
  camera: ^0.10.3
  permission_handler: ^10.2.0
  geolocator: ^9.0.2
  flutter_local_notifications: ^13.0.0
  photo_view: ^0.14.0
  flutter_svg: ^2.0.0+1
  shimmer: ^2.0.0
  connectivity_plus: ^3.0.3
  flutter_cache_manager: ^3.3.0
  flutter_markdown: ^0.6.14
  flutter_secure_storage: ^8.0.0
  crypto: ^3.0.2
  device_info_plus: ^8.1.0
  package_info_plus: ^3.0.3
  flutter_native_splash: ^2.2.17
  flutter_launcher_icons: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    
